  {
    num: 1, title: "Two Sum", difficulty: "Easy", category: "Array",
    question: "Given an array of integers <code>nums</code> and an integer <code>target</code>, return indices of the two numbers such that they add up to <code>target</code>.",
    solution: `class Solution {
    public int[] twoSum(int[] nums, int target) {
        Map<Integer, Integer> map = new HashMap<>();
        for (int i = 0; i < nums.length; i++) {
            int complement = target - nums[i];
            if (map.containsKey(complement))
                return new int[]{ map.get(complement), i };
            map.put(nums[i], i);
        }
        return new int[]{};
    }
}`, tc: "O(n)", sc: "O(n)"
  },
  {
    num: 2, title: "Best Time to Buy and Sell Stock", difficulty: "Easy", category: "Array",
    question: "Given an array <code>prices</code> where <code>prices[i]</code> is the price on day <code>i</code>, return the maximum profit from one buy/sell transaction.",
    solution: `class Solution {
    public int maxProfit(int[] prices) {
        int minPrice = Integer.MAX_VALUE, maxProfit = 0;
        for (int price : prices) {
            minPrice = Math.min(minPrice, price);
            maxProfit = Math.max(maxProfit, price - minPrice);
        }
        return maxProfit;
    }
}`, tc: "O(n)", sc: "O(1)"
  },

    num: 3, title: "Contains Duplicate", difficulty: "Easy", category: "Array",
    question: "Given an integer array <code>nums</code>, return <code>true</code> if any value appears at least twice.",
    solution: `class Solution {
    public boolean containsDuplicate(int[] nums) {
        Set<Integer> seen = new HashSet<>();
        for (int n : nums)
            if (!seen.add(n)) return true;
        return false;
    }
}`, tc: "O(n)", sc: "O(n)"
  },
  {
    num: 4, title: "Product of Array Except Self", difficulty: "Medium", category: "Array",
    question: "Return an array <code>output</code> where <code>output[i]</code> equals the product of all elements except <code>nums[i]</code>, without using division.",
    solution: `class Solution {
    public int[] productExceptSelf(int[] nums) {
        int n = nums.length;
        int[] res = new int[n];
        res[0] = 1;
        for (int i = 1; i < n; i++)
            res[i] = res[i-1] * nums[i-1];
        int right = 1;
        for (int i = n-1; i >= 0; i--) {
            res[i] *= right;
            right  *= nums[i];
        }
        return res;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 5, title: "Maximum Subarray", difficulty: "Medium", category: "Array",
    question: "Given integer array <code>nums</code>, find the contiguous subarray with the largest sum and return its sum. (Kadane's Algorithm)",
    solution: `class Solution {
    public int maxSubArray(int[] nums) {
        int maxSum = nums[0], cur = nums[0];
        for (int i = 1; i < nums.length; i++) {
            cur = Math.max(nums[i], cur + nums[i]);
            maxSum = Math.max(maxSum, cur);
        }
        return maxSum;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 6, title: "Maximum Product Subarray", difficulty: "Medium", category: "Array",
    question: "Find the contiguous subarray with the largest product.",
    solution: `class Solution {
    public int maxProduct(int[] nums) {
        int maxP = nums[0], minP = nums[0], res = nums[0];
        for (int i = 1; i < nums.length; i++) {
            int tmpMax = maxP;
            maxP = Math.max(nums[i], Math.max(maxP * nums[i], minP * nums[i]));
            minP = Math.min(nums[i], Math.min(tmpMax * nums[i], minP * nums[i]));
            res  = Math.max(res, maxP);
        }
        return res;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 7, title: "Find Minimum in Rotated Sorted Array", difficulty: "Medium", category: "Array",
    question: "Given a rotated sorted array of unique elements, return the minimum element.",
    solution: `class Solution {
    public int findMin(int[] nums) {
        int lo = 0, hi = nums.length - 1;
        while (lo < hi) {
            int mid = lo + (hi - lo) / 2;
            if (nums[mid] > nums[hi]) lo = mid + 1;
            else                      hi = mid;
        }
        return nums[lo];
    }
}`, tc: "O(log n)", sc: "O(1)"
  },
  {
    num: 8, title: "Search in Rotated Sorted Array", difficulty: "Medium", category: "Array",
    question: "Search for a target value in a rotated sorted array. Return its index or -1.",
    solution: `class Solution {
    public int search(int[] nums, int target) {
        int lo = 0, hi = nums.length - 1;
        while (lo <= hi) {
            int mid = lo + (hi - lo) / 2;
            if (nums[mid] == target) return mid;
            if (nums[lo] <= nums[mid]) {
                if (nums[lo] <= target && target < nums[mid]) hi = mid - 1;
                else lo = mid + 1;
            } else {
                if (nums[mid] < target && target <= nums[hi]) lo = mid + 1;
                else hi = mid - 1;
            }
        }
        return -1;
    }
}`, tc: "O(log n)", sc: "O(1)"
  },
  {
    num: 9, title: "3Sum", difficulty: "Medium", category: "Array",
    question: "Find all unique triplets in the array that sum to zero.",
    solution: `class Solution {
    public List<List<Integer>> threeSum(int[] nums) {
        List<List<Integer>> res = new ArrayList<>();
        Arrays.sort(nums);
        for (int i = 0; i < nums.length - 2; i++) {
            if (i > 0 && nums[i] == nums[i-1]) continue;
            int lo = i+1, hi = nums.length-1;
            while (lo < hi) {
                int s = nums[i] + nums[lo] + nums[hi];
                if (s == 0) {
                    res.add(Arrays.asList(nums[i], nums[lo], nums[hi]));
                    while (lo < hi && nums[lo] == nums[lo+1]) lo++;
                    while (lo < hi && nums[hi] == nums[hi-1]) hi--;
                    lo++; hi--;
                } else if (s < 0) lo++;
                else hi--;
            }
        }
        return res;
    }
}`, tc: "O(n²)", sc: "O(n)"
  },
  {
    num: 10, title: "Container With Most Water", difficulty: "Medium", category: "Array",
    question: "Given heights of vertical lines, find two lines that form a container holding the most water.",
    solution: `class Solution {
    public int maxArea(int[] height) {
        int lo = 0, hi = height.length - 1, max = 0;
        while (lo < hi) {
            max = Math.max(max, Math.min(height[lo], height[hi]) * (hi - lo));
            if (height[lo] < height[hi]) lo++;
            else hi--;
        }
        return max;
    }
}`, tc: "O(n)", sc: "O(1)"
  },

  // ── STRING ─────────────────────────────────────────────────────────────────
  {
    num: 11, title: "Longest Substring Without Repeating Characters", difficulty: "Medium", category: "String",
    question: "Given a string, find the length of the longest substring without repeating characters.",
    solution: `class Solution {
    public int lengthOfLongestSubstring(String s) {
        Map<Character, Integer> map = new HashMap<>();
        int max = 0, left = 0;
        for (int right = 0; right < s.length(); right++) {
            char c = s.charAt(right);
            if (map.containsKey(c))
                left = Math.max(left, map.get(c) + 1);
            map.put(c, right);
            max = Math.max(max, right - left + 1);
        }
        return max;
    }
}`, tc: "O(n)", sc: "O(min(m,n))"
  },
  {
    num: 12, title: "Longest Repeating Character Replacement", difficulty: "Medium", category: "String",
    question: "Given a string and integer k, find the length of the longest substring containing the same letter after replacing at most k characters.",
    solution: `class Solution {
    public int characterReplacement(String s, int k) {
        int[] count = new int[26];
        int maxCount = 0, left = 0, res = 0;
        for (int right = 0; right < s.length(); right++) {
            maxCount = Math.max(maxCount, ++count[s.charAt(right)-'A']);
            while ((right - left + 1) - maxCount > k)
                count[s.charAt(left++)-'A']--;
            res = Math.max(res, right - left + 1);
        }
        return res;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 13, title: "Minimum Window Substring", difficulty: "Hard", category: "String",
    question: "Given strings s and t, return the minimum window substring of s that contains all characters of t.",
    solution: `class Solution {
    public String minWindow(String s, String t) {
        Map<Character,Integer> need = new HashMap<>(), window = new HashMap<>();
        for (char c : t.toCharArray()) need.merge(c, 1, Integer::sum);
        int left = 0, valid = 0, start = 0, minLen = Integer.MAX_VALUE;
        for (int right = 0; right < s.length(); right++) {
            char c = s.charAt(right);
            window.merge(c, 1, Integer::sum);
            if (need.containsKey(c) && window.get(c).equals(need.get(c))) valid++;
            while (valid == need.size()) {
                if (right - left + 1 < minLen) { start = left; minLen = right - left + 1; }
                char d = s.charAt(left++);
                if (need.containsKey(d) && window.get(d).equals(need.get(d))) valid--;
                window.merge(d, -1, Integer::sum);
            }
        }
        return minLen == Integer.MAX_VALUE ? "" : s.substring(start, start + minLen);
    }
}`, tc: "O(n+m)", sc: "O(m)"
  },
  {
    num: 14, title: "Valid Anagram", difficulty: "Easy", category: "String",
    question: "Determine if string <code>t</code> is an anagram of string <code>s</code>.",
    solution: `class Solution {
    public boolean isAnagram(String s, String t) {
        if (s.length() != t.length()) return false;
        int[] count = new int[26];
        for (char c : s.toCharArray()) count[c-'a']++;
        for (char c : t.toCharArray()) if (--count[c-'a'] < 0) return false;
        return true;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 15, title: "Group Anagrams", difficulty: "Medium", category: "String",
    question: "Group strings that are anagrams of each other.",
    solution: `class Solution {
    public List<List<String>> groupAnagrams(String[] strs) {
        Map<String, List<String>> map = new HashMap<>();
        for (String s : strs) {
            char[] ca = s.toCharArray();
            Arrays.sort(ca);
            map.computeIfAbsent(new String(ca), k -> new ArrayList<>()).add(s);
        }
        return new ArrayList<>(map.values());
    }
}`, tc: "O(n·k log k)", sc: "O(n·k)"
  },
  {
    num: 16, title: "Valid Parentheses", difficulty: "Easy", category: "String",
    question: "Given a string of brackets, determine if it is valid (open brackets closed in correct order).",
    solution: `class Solution {
    public boolean isValid(String s) {
        Deque<Character> stack = new ArrayDeque<>();
        for (char c : s.toCharArray()) {
            if (c=='(' || c=='{' || c=='[') stack.push(c);
            else if (stack.isEmpty()) return false;
            else {
                char top = stack.pop();
                if (c==')' && top!='(') return false;
                if (c=='}' && top!='{') return false;
                if (c==']' && top!='[') return false;
            }
        }
        return stack.isEmpty();
    }
}`, tc: "O(n)", sc: "O(n)"
  },
  {
    num: 17, title: "Valid Palindrome", difficulty: "Easy", category: "String",
    question: "A phrase is palindrome if it reads the same forward and backward, ignoring non-alphanumeric characters and case.",
    solution: `class Solution {
    public boolean isPalindrome(String s) {
        int lo = 0, hi = s.length() - 1;
        while (lo < hi) {
            while (lo < hi && !Character.isLetterOrDigit(s.charAt(lo))) lo++;
            while (lo < hi && !Character.isLetterOrDigit(s.charAt(hi))) hi--;
            if (Character.toLowerCase(s.charAt(lo)) !=
                Character.toLowerCase(s.charAt(hi))) return false;
            lo++; hi--;
        }
        return true;
    }
}`, tc: "O(n)", sc: "O(1)"
  },
  {
    num: 18, title: "Longest Palindromic Substring", difficulty: "Medium", category: "String",
    question: "Given a string, find the longest palindromic substring.",
    solution: `class Solution {
    public String longestPalindrome(String s) {
        String res = "";
        for (int i = 0; i < s.length(); i++) {
            // odd
            String odd = expand(s, i, i);
            if (odd.length() > res.length()) res = odd;
            // even
            String even = expand(s, i, i+1);
            if (even.length() > res.length()) res = even;
        }
        return res;
    }
    private String expand(String s, int l, int r) {
        while (l >= 0 && r < s.length() && s.charAt(l) == s.charAt(r)) { l--; r++; }
        return s.substring(l+1, r);
    }
}`, tc: "O(n²)", sc: "O(1)"
  },
  {
    num: 19, title: "Palindromic Substrings", difficulty: "Medium", category: "String",
    question: "Count the number of palindromic substrings in a string.",
    solution: `class Solution {
    public int countSubstrings(String s) {
        int count = 0;
        for (int i = 0; i < s.length(); i++) {
            count += expand(s, i, i);    // odd
            count += expand(s, i, i+1);  // even
        }
        return count;
    }
    private int expand(String s, int l, int r) {
        int c = 0;
        while (l >= 0 && r < s.length() && s.charAt(l--) == s.charAt(r++)) c++;
        return c;
    }
}`, tc: "O(n²)", sc: "O(1)"
  },
  {
    num: 20, title: "Encode and Decode Strings", difficulty: "Medium", category: "String",
    question: "Design an algorithm to encode/decode a list of strings to a single string sent over the network.",
    solution: `public class Codec {
    public String encode(List<String> strs) {
        StringBuilder sb = new StringBuilder();
        for (String s : strs) sb.append(s.length()).append('#').append(s);
        return sb.toString();
    }
    public List<String> decode(String s) {
        List<String> res = new ArrayList<>();
        int i = 0;
        while (i < s.length()) {
            int j = s.indexOf('#', i);
            int len = Integer.parseInt(s.substring(i, j));
            res.add(s.substring(j+1, j+1+len));
            i = j + 1 + len;
        }
        return res;
    }
}`, tc: "O(n)", sc: "O(n)"

  {
    num: 21, title: "Maximum Depth of Binary Tree", difficulty: "Easy", category: "Tree",
    question: "Find the maximum depth (number of nodes along the longest root-to-leaf path) of a binary tree.",
    solution: `class Solution {
    public int maxDepth(TreeNode root) {
        if (root == null) return 0;
        return 1 + Math.max(maxDepth(root.left), maxDepth(root.right));
    }
}`, tc: "O(n)", sc: "O(h)"
  },
  {
    num: 22, title: "Same Tree", difficulty: "Easy", category: "Tree",
    question: "Given the roots of two binary trees, check if they are structurally identical and have the same node values.",
    solution: `class Solution {
    public boolean isSameTree(TreeNode p, TreeNode q) {
        if (p == null && q == null) return true;
        if (p == null || q == null) return false;
        return p.val == q.val
            && isSameTree(p.left,  q.left)
            && isSameTree(p.right, q.right);
    }
}`, tc: "O(n)", sc: "O(h)"
  },
  {
    num: 23, title: "Invert Binary Tree", difficulty: "Easy", category: "Tree",
    question: "Invert (mirror) a binary tree.",
    solution: `class Solution {
    public TreeNode invertTree(TreeNode root) {
        if (root == null) return null;
        TreeNode tmp    = root.left;
        root.left       = invertTree(root.right);
        root.right      = invertTree(tmp);
        return root;
    }
}`, tc: "O(n)", sc: "O(h)"

  {
    num: 24, title: "Binary Tree Level Order Traversal", difficulty: "Medium", category: "Tree",
    question: "Return the level-order traversal of a binary tree's nodes' values (from left to right, level by level).",
    solution: `class Solution {
    public List<List<Integer>> levelOrder(TreeNode root) {
        List<List<Integer>> res = new ArrayList<>();
        if (root == null) return res;
        Queue<TreeNode> q = new LinkedList<>();
        q.offer(root);
        while (!q.isEmpty()) {
            int size = q.size();
            List<Integer> level = new ArrayList<>();
            for (int i = 0; i < size; i++) {
                TreeNode n = q.poll();
                level.add(n.val);

    public List<List<Integer>> pacificAtlantic(int[][] h) {

        for (int r = 0; r < R; r++) { pq.offer(new int[]{r,0}); pac[r][0]=true; aq.offer(new int[]{r,C-1}); atl[r][C-1]=true; }
        for (int c = 0; c < C; c++) { pq.offer(new int[]{0,c}); pac[0][c]=true; aq.offer(new int[]{R-1,c}); atl[R-1][c]=true; }
        bfs(h,pq,pac); bfs(h,aq,atl);
        List<List<Integer>> res = new ArrayList<>();
        for (int r=0;r<R;r++) for (int c=0;c<C;c++) if (pac[r][c]&&atl[r][c]) res.add(Arrays.asList(r,c));

        while (i < n && intervals[i][1] < newInterval[0]) res.add(intervals[i++]);

            newInterval[1] = Math.max(newInterval[1], intervals[i][1]);

        res.add(newInterval);

    }

    public List<Integer> spiralOrder(int[][] matrix) {
        List<Integer> res = new ArrayList<>();
        int top=0, bot=matrix.length-1, left=0, right=matrix[0].length-1;
        while (top<=bot && left<=right) {
            for (int c=left;c<=right;c++) res.add(matrix[top][c]); top++;
            for (int r=top;r<=bot;r++) res.add(matrix[r][right]); right--;
            if (top<=bot) for (int c=right;c>=left;c--) res.add(matrix[bot][c]); bot--;
            if (left<=right) for (int r=bot;r>=top;r--) res.add(matrix[r][left]); left++;
        }
        return res;
    }

    public void rotate(int[][] matrix) {
        int n = matrix.length;
        // Transpose
        for (int i=0;i<n;i++) for (int j=i+1;j<n;j++) { int t=matrix[i][j]; matrix[i][j]=matrix[j][i]; matrix[j][i]=t; }
        // Reverse each row
        for (int[] row : matrix) {

    public int[] topKFrequent(int[] nums, int k) {
        Map<Integer,Integer> freq = new HashMap<>();
        for (int n : nums) freq.merge(n, 1, Integer::sum);
        PriorityQueue<Integer> pq = new PriorityQueue<>(Comparator.comparingInt(freq::get));
        for (int n : freq.keySet()) {
            pq.offer(n);
            if (pq.size() > k) pq.poll();
        }
        int[] res = new int[k];
        for (int i=k-1;i>=0;i--) res[i]=pq.poll();
        return res;
    }

    private TrieNode root = new TrieNode();
    public void insert(String word) {
        TrieNode cur = root;
        for (char c : word.toCharArray()) {
            cur.children.putIfAbsent(c, new TrieNode());
            cur = cur.children.get(c);

        cur.isEnd = true;

    public boolean search(String word) {
        TrieNode cur = root;
        for (char c : word.toCharArray()) {
            if (!cur.children.containsKey(c)) return false;
            cur = cur.children.get(c);
        }
        return cur.isEnd;
    }
    public boolean startsWith(String prefix) {
        TrieNode cur = root;
        for (char c : prefix.toCharArray()) {
            if (!cur.children.containsKey(c)) return false;
            cur = cur.children.get(c);

    TrieNode root = new TrieNode();
    public void addWord(String word) {
        TrieNode cur = root;
        for (char c : word.toCharArray()) {
            cur.children.putIfAbsent(c, new TrieNode());
            cur = cur.children.get(c);

        cur.isEnd = true;
    }
    public boolean search(String word) { return dfs(word, 0, root); }
    private boolean dfs(String w, int i, TrieNode node) {
        if (i == w.length()) return node.isEnd;
        char c = w.charAt(i);
        if (c == '.') {
            for (TrieNode child : node.children.values())
                if (dfs(w, i+1, child)) return true;
            return false;
        }
        if (!node.children.containsKey(c)) return false;
        return dfs(w, i+1, node.children.get(c));

    solution: `class Solution {
    public List<String> findWords(char[][] board, String[] words) {
        TrieNode root = buildTrie(words);
        Set<String> res = new HashSet<>();
        for (int r=0;r<board.length;r++)
            for (int c=0;c<board[0].length;c++)
                dfs(board,r,c,root,res);
        return new ArrayList<>(res);
    }
    private void dfs(char[][] b, int r, int c, TrieNode node, Set<String> res) {
        if (r<0||c<0||r>=b.length||c>=b[0].length) return;
        char ch=b[r][c];
        if (ch=='#'||node.children[ch-'a']==null) return;
        node=node.children[ch-'a'];
        if (node.word!=null) res.add(node.word);
        b[r][c]='#';
        dfs(b,r+1,c,node,res); dfs(b,r-1,c,node,res);
        dfs(b,r,c+1,node,res); dfs(b,r,c-1,node,res);
        b[r][c]=ch;
    }
    private TrieNode buildTrie(String[] words) {
        TrieNode root=new TrieNode();
        for (String w:words) { TrieNode cur=root; for (char c:w.toCharArray()) { if (cur.children[c-'a']==null) cur.children[c-'a']=new TrieNode(); cur=cur.children[c-'a']; } cur.word=w; }

    public int longestConsecutive(int[] nums) {

        for (int n : nums) set.add(n);
        int longest = 0;
        for (int n : set) {
            if (!set.contains(n - 1)) { // start of sequence
                int len = 1;
                while (set.contains(n + len)) len++;
                longest = Math.max(longest, len);
            }
        }
        return longest;
    }

let solved = JSON.parse(localStorage.getItem('blind75_solved') || '{}');
let currentCategory = 'All';

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = currentCategory === 'All'
    ? problems
    : problems.filter(p => p.category === currentCategory);

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.category = p.category;
    const diffClass = 'badge-' + p.difficulty.toLowerCase();
    const solvedClass = solved[p.num] ? 'done' : '';
    card.innerHTML = `
      <div class="card-header" onclick="toggleSolution(${p.num})">
        <span class="card-num">#${p.num}</span>
        <span class="card-title">${p.title}</span>
        <span class="badge ${diffClass}">${p.difficulty}</span>
        <span class="tag">${p.category}</span>
      </div>
      <div class="card-question">${p.question}</div>
      <div class="card-actions">
        <button class="btn-solution" onclick="toggleSolution(${p.num},event)">Show Solution</button>
        <button class="btn-solved ${solvedClass}" id="solvedBtn_${p.num}" onclick="markSolved(${p.num},event)">
          ${solved[p.num] ? '✓ Solved' : 'Mark Solved'}
        </button>
      </div>
      <div class="solution-block" id="sol_${p.num}">
        <h4>Java Solution</h4>
        <pre>${escapeHtml(p.solution)}</pre>
        <div class="complexity">
          <span>Time: <b>${p.tc}</b></span>
          <span>Space: <b>${p.sc}</b></span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  updateProgress();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSolution(num, e) {
  if (e) e.stopPropagation();
  const sol = document.getElementById('sol_' + num);
  const btn = sol.previousElementSibling.querySelector('.btn-solution');
  const isVisible = sol.classList.toggle('visible');
  btn.textContent = isVisible ? 'Hide Solution' : 'Show Solution';
}

function markSolved(num, e) {
  e.stopPropagation();
  solved[num] = !solved[num];
  localStorage.setItem('blind75_solved', JSON.stringify(solved));
  const btn = document.getElementById('solvedBtn_' + num);
  btn.textContent = solved[num] ? '✓ Solved' : 'Mark Solved';
  btn.classList.toggle('done', !!solved[num]);
  updateProgress();
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === cat ||
      (cat === 'DP' && b.textContent.trim() === 'Dynamic Programming') ||
      (cat === 'All' && b.textContent.trim() === 'All'));
  });
  renderCards();
}

function updateProgress() {
  const total = problems.length;
  const done = Object.values(solved).filter(Boolean).length;
  document.getElementById('progressLabel').textContent = `${done} / ${total} solved`;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
}

renderCards();
</script>
